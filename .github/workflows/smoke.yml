name: Smoke Tests (Post-Deploy)

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Production URL to smoke test'
        required: true
        default: 'https://nano-spaces.vercel.app'
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    # Only run on successful CI completion on main, or manual trigger
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run smoke tests
        env:
          SMOKE_URL: ${{ github.event.inputs.target_url || 'https://nano-spaces.vercel.app' }}
        run: npm run test:smoke

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Smoke tests failed on ${new Date().toISOString()}`,
              body: `Smoke tests failed after deploy. Check the workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nThis may require a rollback.`,
              labels: ['incident', 'smoke-failure'],
            })
